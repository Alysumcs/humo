        70% { fill-opacity: 0; stroke-opacity: 1; }
        100% { stroke-dashoffset: 0; fill-opacity: 1; stroke-opacity: 0; }
      }

      @keyframes fadeInText {
        0% { opacity: 0; }
        100% { opacity: 1; }
      }

      .logo-path {
